<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF AI Review</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    input[type="file"] {
      display: block;
      margin: 20px 0;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }
    pre {
      background: #eee;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
    }
    .section {
      margin-bottom: 20px;
    }
    .section h2 {
      color: #4CAF50;
      margin-bottom: 10px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDF AI Review</h1>
    <input type="file" id="pdfFile">
    <button onclick="uploadPDF()">Analyze PDF</button>

    <div id="result" style="display:none;">
      <div class="section">
        <h2>Summary</h2>
        <p id="summary"></p>
      </div>
      <div class="section">
        <h2>Positive Points</h2>
        <ul id="positive_points"></ul>
      </div>
      <div class="section">
        <h2>Negative Points</h2>
        <ul id="negative_points"></ul>
      </div>
      <div class="section">
        <h2>How to Avoid</h2>
        <ul id="how_to_avoid"></ul>
      </div>
    </div>
  </div>

  <script>
    async function uploadPDF() {
      const fileInput = document.getElementById('pdfFile');
      if (!fileInput.files[0]) {
        alert("Please select a PDF file!");
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = "none";  // hide while loading
      document.getElementById('summary').innerText = "Loading...";

      try {
        const response = await fetch("/analyze", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        const jsonOutput = data.json_output || data; // handle your response structure

        // Summary
        document.getElementById('summary').innerText = jsonOutput.summary || "";

        // Positive Points
        const posList = document.getElementById('positive_points');
        posList.innerHTML = "";
        (jsonOutput.positive_points || []).forEach(point => {
          const li = document.createElement('li');
          li.innerText = point;
          posList.appendChild(li);
        });

        // Negative Points
        const negList = document.getElementById('negative_points');
        negList.innerHTML = "";
        (jsonOutput.negative_points || []).forEach(point => {
          const li = document.createElement('li');
          li.innerText = point;
          negList.appendChild(li);
        });

        // How to Avoid
        const avoidList = document.getElementById('how_to_avoid');
        avoidList.innerHTML = "";
        (jsonOutput.how_to_avoid || []).forEach(point => {
          const li = document.createElement('li');
          li.innerText = point;
          avoidList.appendChild(li);
        });

        resultDiv.style.display = "block";

      } catch (err) {
        alert("Error analyzing PDF: " + err);
      }
    }
  </script>
</body>
</html>
